<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LocalAgent</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --panel-2: #1c2128;
        --border: #30363d;
        --fg: #e6edf3;
        --muted: #8b949e;
        --accent: #58a6ff;
        --green: #3fb950;
        --yellow: #d29922;
        --red: #f85149;
        --purple: #bc8cff;
      }
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        font-size: 14px;
      }
      .app { display: grid; grid-template-columns: 360px 1fr; height: 100%; }
      .sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
      .sidebar h1 { font-size: 18px; margin: 0 0 4px 0; }
      .sidebar .sub { color: var(--muted); font-size: 12px; }
      .field { display: flex; flex-direction: column; margin-bottom: 14px; }
      .field label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
      .field input, .field textarea, .field select {
        background: var(--panel-2);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 10px;
        font: inherit;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 13px;
      }
      .field textarea { resize: vertical; min-height: 80px; }
      .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--accent); }
      .btn {
        background: var(--accent);
        color: #0d1117;
        border: 0;
        border-radius: 6px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        font-size: 14px;
      }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn.danger { background: var(--red); color: white; }
      .btn.ghost { background: transparent; color: var(--fg); border: 1px solid var(--border); padding: 7px 10px; font-size: 12px; font-weight: 500; }

      .sessions-header { display: flex; align-items: center; justify-content: space-between; }
      .sessions-header h2 { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin: 0; }
      .sessions { display: flex; flex-direction: column; gap: 4px; }
      .session-item {
        display: grid; grid-template-columns: 1fr auto; gap: 4px; align-items: center;
        background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px;
        padding: 8px 10px; cursor: pointer; transition: border-color 0.1s;
      }
      .session-item:hover { border-color: var(--accent); }
      .session-item.active { border-color: var(--accent); background: rgba(88,166,255,0.08); }
      .session-item .goal {
        font-size: 13px; color: var(--fg); overflow: hidden; text-overflow: ellipsis;
        white-space: nowrap; max-width: 220px;
      }
      .session-item .meta { font-size: 11px; color: var(--muted); display: flex; gap: 6px; align-items: center; margin-top: 2px; }
      .session-item .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
      .session-item .dot.running { background: var(--yellow); animation: pulse 1.5s ease-in-out infinite; }
      .session-item .dot.finished { background: var(--green); }
      .session-item .dot.error, .session-item .dot.canceled, .session-item .dot.max_iter { background: var(--red); }
      .session-item .delete {
        background: transparent; border: 0; color: var(--muted); cursor: pointer; padding: 4px 6px;
        font-size: 16px; line-height: 1; border-radius: 4px;
      }
      .session-item .delete:hover { background: var(--red); color: white; }
      .sessions-empty { color: var(--muted); font-size: 12px; font-style: italic; padding: 4px 0; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

      .continue-banner {
        background: rgba(88,166,255,0.08); border: 1px solid var(--accent); border-radius: 6px;
        padding: 10px 12px; margin-bottom: 14px;
      }
      .continue-banner-title { font-size: 12px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.04em; }
      .continue-banner-meta { font-size: 12px; color: var(--muted); margin-top: 4px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

      .main { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
      .header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
      .header .title { font-weight: 600; color: var(--fg); }
      .header .meta { font-size: 12px; color: var(--muted); display: flex; gap: 10px; align-items: center; }
      .header .status { font-size: 12px; padding: 3px 8px; border-radius: 12px; background: var(--panel-2); border: 1px solid var(--border); }
      .header .status.running { color: var(--yellow); border-color: var(--yellow); }
      .header .status.finished { color: var(--green); border-color: var(--green); }
      .header .status.error, .header .status.canceled, .header .status.max_iter { color: var(--red); border-color: var(--red); }
      .header .spacer { flex: 1; }
      .events { flex: 1; overflow-y: auto; padding: 16px 20px; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 13px; line-height: 1.55; }
      .event { padding: 6px 0; border-bottom: 1px dashed transparent; }
      .event.iteration { color: var(--accent); font-weight: 700; padding-top: 14px; padding-bottom: 4px; border-top: 1px solid var(--border); margin-top: 10px; }
      .event.iteration:first-child { border-top: 0; margin-top: 0; }
      .event.started { color: var(--muted); }
      .event.model_text { color: var(--fg); white-space: pre-wrap; }
      .event.tool_call { color: var(--yellow); }
      .event.tool_call .name { color: var(--purple); font-weight: 600; }
      .event.tool_result { color: var(--muted); white-space: pre-wrap; padding-left: 16px; border-left: 2px solid var(--border); }
      .event.tool_result.error { color: var(--red); border-left-color: var(--red); }
      .event.compaction { color: var(--purple); font-style: italic; padding-left: 16px; border-left: 2px dotted var(--purple); }
      .event.compaction.error { color: var(--red); border-left-color: var(--red); }
      .event.skill_activated { color: var(--accent); padding-left: 16px; border-left: 2px solid var(--accent); }
      .event.skill_activated .skill-name { font-weight: 700; }
      .event.skill_activated .skill-desc { color: var(--muted); font-size: 12px; margin-top: 2px; }

      .event.question { color: var(--yellow); padding: 10px 12px; border-left: 3px solid var(--yellow); background: rgba(210, 153, 34, 0.08); border-radius: 0 6px 6px 0; margin-top: 8px; }
      .event.question .q-label { font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 0.04em; margin-bottom: 4px; }
      .event.question .q-text { color: var(--fg); white-space: pre-wrap; }
      .event.answer { color: var(--green); padding-left: 16px; border-left: 3px solid var(--green); white-space: pre-wrap; }
      .event.answer .a-label { font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 0.04em; margin-right: 8px; }

      .prompt-box { position: sticky; bottom: 0; background: var(--panel); border-top: 1px solid var(--yellow); padding: 12px 20px; }
      .prompt-box .pb-question { color: var(--yellow); font-size: 12px; margin-bottom: 6px; font-weight: 600; }
      .prompt-box .pb-row { display: flex; gap: 8px; align-items: stretch; }
      .prompt-box textarea {
        flex: 1; background: var(--panel-2); color: var(--fg); border: 1px solid var(--border); border-radius: 6px;
        padding: 8px 10px; font: inherit; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 13px;
        resize: vertical; min-height: 50px;
      }
      .prompt-box textarea:focus { outline: none; border-color: var(--yellow); }
      .prompt-box .pb-options { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
      .prompt-box .pb-options button {
        background: var(--panel-2); color: var(--fg); border: 1px solid var(--border); border-radius: 4px;
        padding: 4px 10px; cursor: pointer; font-size: 12px;
      }
      .prompt-box .pb-options button:hover { border-color: var(--yellow); color: var(--yellow); }
      .prompt-box button.send {
        background: var(--yellow); color: #0d1117; border: 0; border-radius: 6px; padding: 8px 16px;
        font-weight: 600; cursor: pointer;
      }
      .prompt-box button.send:disabled { opacity: 0.5; cursor: not-allowed; }
      .prompt-box .pb-error { color: var(--red); font-size: 12px; margin-top: 4px; }

      .skills-block { background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; margin-bottom: 14px; }
      .skills-block .skills-block-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
      .skills-block .skills-empty { color: var(--muted); font-size: 12px; font-style: italic; }
      .skill-item { display: flex; align-items: flex-start; gap: 8px; padding: 4px 0; cursor: pointer; }
      .skill-item input { margin-top: 3px; }
      .skill-item .name { font-weight: 600; }
      .skill-item .src { font-size: 10px; color: var(--muted); padding: 1px 4px; border: 1px solid var(--border); border-radius: 3px; margin-left: 6px; text-transform: uppercase; }
      .skill-item .desc { color: var(--muted); font-size: 12px; line-height: 1.4; }
      .skill-item.via-slash .name::after { content: " · /slash"; font-size: 11px; color: var(--accent); font-weight: 400; }

      .todos-panel { background: var(--panel); border-bottom: 1px solid var(--border); padding: 10px 20px; }
      .todos-panel .tp-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
      .todos-panel .tp-header .tp-counts { color: var(--muted); text-transform: none; letter-spacing: 0; font-weight: 400; font-size: 12px; }
      .todos-panel .tp-list { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
      .todos-panel .tp-empty { color: var(--muted); font-style: italic; font-size: 12px; padding: 6px 0; }
      .todo-row { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; line-height: 1.4; }
      .todo-row .mark { flex: 0 0 16px; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-weight: 700; }
      .todo-row.pending .mark { color: var(--muted); }
      .todo-row.in_progress .mark { color: var(--yellow); }
      .todo-row.completed .mark { color: var(--green); }
      .todo-row.completed .content { color: var(--muted); text-decoration: line-through; }
      .todo-row.in_progress .content { color: var(--fg); font-weight: 600; }
      .todo-row.pending .content { color: var(--fg); }
      .event.done { color: var(--green); font-weight: 700; padding-top: 14px; }
      .event.done.error { color: var(--red); }
      .event.done.canceled, .event.done.max_iter { color: var(--yellow); }
      .empty { color: var(--muted); text-align: center; margin-top: 40px; font-family: inherit; }
      details.args { margin-top: 2px; }
      details.args summary { cursor: pointer; color: var(--muted); font-size: 12px; }
      details.args pre { background: var(--panel-2); border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; margin: 4px 0 0; white-space: pre-wrap; word-break: break-all; }
      .pill { display: inline-block; padding: 1px 6px; border-radius: 4px; background: var(--panel-2); border: 1px solid var(--border); font-size: 11px; color: var(--muted); margin-left: 6px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" data-presets="react">
      const { useState, useEffect, useRef, useCallback } = React;

      // ---------- helpers --------------------------------------------------

      function fmtTime(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        if (isNaN(d.getTime())) return "";
        const now = new Date();
        const sameDay = d.toDateString() === now.toDateString();
        if (sameDay) return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        const diffDays = Math.floor((now - d) / 86400000);
        if (diffDays < 7) return d.toLocaleDateString([], { weekday: "short" }) + " " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        return d.toLocaleDateString();
      }

      function prettyArgs(s) {
        if (!s) return "(no arguments)";
        try {
          const obj = JSON.parse(s);
          const compact = JSON.stringify(obj);
          return compact.length > 120 ? compact.slice(0, 120) + "…" : compact;
        } catch (_) {
          return s.length > 120 ? s.slice(0, 120) + "…" : s;
        }
      }

      // ---------- App ------------------------------------------------------

      function App() {
        const [form, setForm] = useState(() => ({
          model: localStorage.getItem("oa.model") || "qwen2.5-coder:7b",
          compaction_model: localStorage.getItem("oa.compactionModel") || "",
          host: localStorage.getItem("oa.host") || "",
          workdir: localStorage.getItem("oa.workdir") || ".",
          goal: "",
          context_tokens: Number(localStorage.getItem("oa.contextTokens") || 32768),
        }));
        const [sessions, setSessions] = useState([]);
        const [current, setCurrent] = useState(null);
        // current shape: { id, goal, model, workdir, status, events, isLive }
        const [submitError, setSubmitError] = useState(null);
        const [skillCatalog, setSkillCatalog] = useState([]); // [{name, description, source, path}]
        const [selectedSkills, setSelectedSkills] = useState(() => {
          try { return JSON.parse(localStorage.getItem("oa.selectedSkills") || "[]"); } catch (_) { return []; }
        });

        const esRef = useRef(null);
        const eventsEndRef = useRef(null);

        useEffect(() => {
          localStorage.setItem("oa.model", form.model);
          localStorage.setItem("oa.compactionModel", form.compaction_model);
          localStorage.setItem("oa.host", form.host);
          localStorage.setItem("oa.workdir", form.workdir);
          localStorage.setItem("oa.contextTokens", String(form.context_tokens));
        }, [form.model, form.compaction_model, form.host, form.workdir, form.context_tokens]);

        useEffect(() => {
          localStorage.setItem("oa.selectedSkills", JSON.stringify(selectedSkills));
        }, [selectedSkills]);

        // Refresh the skill catalog whenever workdir changes — project-local
        // skills live in <workdir>/.localagent/skills/.
        useEffect(() => {
          const wd = form.workdir;
          if (!wd) { setSkillCatalog([]); return; }
          const ac = new AbortController();
          fetch(`/api/skills?workdir=${encodeURIComponent(wd)}`, { signal: ac.signal })
            .then((r) => r.ok ? r.json() : { skills: [] })
            .then((data) => setSkillCatalog(data.skills || []))
            .catch(() => { /* ignore — directory may not exist */ });
          return () => ac.abort();
        }, [form.workdir]);

        // Parse leading /skill-name tokens out of the goal so the UI can
        // preview which slash-command activations will fire. Matches the
        // server-side skills.ParseSlashCommands behaviour.
        const slashSkillsInGoal = (() => {
          if (!form.goal) return [];
          const known = new Set(skillCatalog.map((s) => s.name));
          const out = [];
          let g = form.goal.trimStart();
          for (let i = 0; i < 8; i++) {
            const m = g.match(/^\/([a-z][a-z0-9-]{0,63})(?:\s+|$)/);
            if (!m) break;
            if (!known.has(m[1])) break;
            if (!out.includes(m[1])) out.push(m[1]);
            g = g.slice(m[0].length).trimStart();
          }
          return out;
        })();

        const effectiveSkills = (() => {
          const seen = new Set();
          const out = [];
          for (const n of selectedSkills) { if (!seen.has(n)) { seen.add(n); out.push(n); } }
          for (const n of slashSkillsInGoal) { if (!seen.has(n)) { seen.add(n); out.push(n); } }
          return out;
        })();

        const toggleSkill = (name) => {
          setSelectedSkills((prev) => prev.includes(name) ? prev.filter((x) => x !== name) : [...prev, name]);
        };

        // Latest todo list: walk events backward for the most recent
        // `todo_update` event. Falls back to session.todos (delivered via
        // GET /api/sessions/{id} when picking a past session).
        const currentTodos = (() => {
          if (current?.events) {
            for (let i = current.events.length - 1; i >= 0; i--) {
              const e = current.events[i];
              if (e.type === "todo_update") return e.todos || [];
            }
          }
          return current?.todos || [];
        })();

        // Find the pending question (if any) in the current session's events.
        // A question is pending if there's a `question` event whose
        // question_id never appears in a later `answer` event.
        const pendingQuestion = (() => {
          if (!current?.events) return null;
          const answered = new Set();
          for (const e of current.events) {
            if (e.type === "answer" && e.question_id) answered.add(e.question_id);
          }
          for (let i = current.events.length - 1; i >= 0; i--) {
            const e = current.events[i];
            if (e.type === "question" && e.question_id && !answered.has(e.question_id)) {
              return e;
            }
          }
          return null;
        })();

        useEffect(() => {
          if (eventsEndRef.current) {
            eventsEndRef.current.scrollIntoView({ behavior: "smooth", block: "end" });
          }
        }, [current?.events?.length]);

        const refreshSessions = useCallback(async () => {
          try {
            const r = await fetch("/api/sessions");
            const list = await r.json();
            setSessions(list || []);
          } catch (_) { /* ignore */ }
        }, []);

        useEffect(() => {
          refreshSessions();
          const t = setInterval(refreshSessions, 5000);
          return () => clearInterval(t);
        }, [refreshSessions]);

        useEffect(() => () => { if (esRef.current) esRef.current.close(); }, []);

        const connectSSE = useCallback((id) => {
          if (esRef.current) esRef.current.close();
          const es = new EventSource(`/api/sessions/${id}/events`);
          esRef.current = es;
          const handle = (raw) => {
            try {
              const ev = JSON.parse(raw.data);
              setCurrent((prev) => {
                if (!prev || prev.id !== id) return prev;
                const next = { ...prev, events: [...prev.events, ev] };
                if (ev.type === "done") {
                  next.status = ev.reason;
                  next.isLive = false;
                  es.close();
                  esRef.current = null;
                  refreshSessions();
                }
                return next;
              });
            } catch (_) {}
          };
          ["started", "iteration", "model_text", "tool_call", "tool_result", "compaction", "skill_activated", "question", "answer", "todo_update", "error", "done"].forEach((t) => {
            es.addEventListener(t, handle);
          });
          es.onerror = () => { /* EventSource auto-reconnects */ };
        }, [refreshSessions]);

        const onSubmit = async (e) => {
          e.preventDefault();
          setSubmitError(null);
          try {
            const r = await fetch("/api/run", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                model: form.model,
                compaction_model: form.compaction_model,
                host: form.host,
                workdir: form.workdir,
                goal: form.goal,
                context_tokens: Number(form.context_tokens) || 0,
                skills: effectiveSkills,
              }),
            });
            const body = await r.json();
            if (!r.ok) throw new Error(body.error || `HTTP ${r.status}`);
            setCurrent({
              id: body.session_id,
              goal: form.goal,
              model: form.model,
              workdir: form.workdir,
              status: "running",
              events: [],
              isLive: true,
            });
            connectSSE(body.session_id);
            refreshSessions();
          } catch (err) {
            setSubmitError(String(err.message || err));
          }
        };

        const onContinue = async (e) => {
          e.preventDefault();
          if (!current?.id) return;
          setSubmitError(null);
          try {
            const r = await fetch(`/api/sessions/${current.id}/continue`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                goal: form.goal,
                host: form.host,
                compaction_model: form.compaction_model,
                context_tokens: Number(form.context_tokens) || 0,
                skills: effectiveSkills,
              }),
            });
            const body = await r.json();
            if (!r.ok) throw new Error(body.error || `HTTP ${r.status}`);
            setCurrent((prev) => prev ? { ...prev, status: "running", isLive: true } : prev);
            setForm((prev) => ({ ...prev, goal: "" }));
            connectSSE(current.id);
            refreshSessions();
          } catch (err) {
            setSubmitError(String(err.message || err));
          }
        };

        const onCancel = async () => {
          if (!current?.id) return;
          await fetch(`/api/sessions/${current.id}/cancel`, { method: "POST" });
        };

        const onPickSession = async (id) => {
          if (current?.id === id && current?.isLive) return;
          if (esRef.current) { esRef.current.close(); esRef.current = null; }
          try {
            const r = await fetch(`/api/sessions/${id}`);
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            const detail = await r.json();
            const isLive = detail.status === "running";
            setCurrent({
              id: detail.id,
              goal: detail.goal,
              model: detail.model,
              workdir: detail.workdir,
              status: detail.status,
              events: detail.events || [],
              todos: detail.todos || [],
              isLive,
            });
            if (isLive) connectSSE(id);
          } catch (err) {
            setSubmitError(String(err.message || err));
          }
        };

        const onDeleteSession = async (id, e) => {
          e.stopPropagation();
          if (!confirm("Delete this session? This can't be undone.")) return;
          await fetch(`/api/sessions/${id}`, { method: "DELETE" });
          if (current?.id === id) {
            if (esRef.current) { esRef.current.close(); esRef.current = null; }
            setCurrent(null);
          }
          refreshSessions();
        };

        const onNewRun = () => {
          if (esRef.current) { esRef.current.close(); esRef.current = null; }
          setCurrent(null);
          setSubmitError(null);
        };

        // -------------------------------------------------------------------
        return (
          <div className="app">
            <aside className="sidebar">
              <div>
                <h1>LocalAgent</h1>
                <div className="sub">Agentic loop · litellm + langchaingo · Ollama</div>
              </div>

              {(() => {
                const isContinue = current && !current.isLive && current.status !== "running";
                return (
                  <form onSubmit={isContinue ? onContinue : onSubmit}>
                    {isContinue ? (
                      <div className="continue-banner">
                        <div className="continue-banner-title">Continuing session</div>
                        <div className="continue-banner-meta">
                          <span title={current.workdir}>{current.workdir}</span>
                          <span>·</span>
                          <span>{current.model}</span>
                        </div>
                      </div>
                    ) : (
                      <>
                        <div className="field">
                          <label>Model</label>
                          <input value={form.model} onChange={(e) => setForm({ ...form, model: e.target.value })}
                                 placeholder="qwen2.5-coder:7b" />
                        </div>
                        <div className="field">
                          <label>Ollama host</label>
                          <input value={form.host} onChange={(e) => setForm({ ...form, host: e.target.value })}
                                 placeholder="http://localhost:11434" />
                        </div>
                        <div className="field">
                          <label>Project directory</label>
                          <input value={form.workdir} onChange={(e) => setForm({ ...form, workdir: e.target.value })}
                                 placeholder="C:\path\to\project" />
                        </div>
                        <div className="field">
                          <label>Compaction model <span style={{ textTransform: "none", fontWeight: 400 }}>(optional)</span></label>
                          <input value={form.compaction_model} onChange={(e) => setForm({ ...form, compaction_model: e.target.value })}
                                 placeholder="leave blank to reuse main model" />
                        </div>
                      </>
                    )}
                    <div className="field">
                      <label>{isContinue ? "Next instruction" : "Goal"}</label>
                      <textarea value={form.goal} onChange={(e) => setForm({ ...form, goal: e.target.value })}
                                placeholder={isContinue ? "Now also add metrics for the /healthz endpoint" : "Add a /healthz endpoint and a test for it"} required />
                    </div>
                    <div className="field">
                      <label>Context window (tokens) <span style={{ textTransform: "none", fontWeight: 400 }}>· 0 disables compaction</span></label>
                      <input type="number" min="0" max="1000000" step="1024" value={form.context_tokens}
                             onChange={(e) => setForm({ ...form, context_tokens: e.target.value })} />
                    </div>
                    <div className="skills-block">
                      <div className="skills-block-title">
                        <span>Skills {effectiveSkills.length > 0 && `· ${effectiveSkills.length} active`}</span>
                        <span style={{ fontSize: 10, textTransform: "none", letterSpacing: 0 }}>SKILL.md in ~/.localagent/skills or workdir/.localagent/skills</span>
                      </div>
                      {skillCatalog.length === 0 ? (
                        <div className="skills-empty">No skills discovered. Drop a `SKILL.md` into <code>~/.localagent/skills/&lt;name&gt;/</code> or <code>&lt;workdir&gt;/.localagent/skills/&lt;name&gt;/</code>.</div>
                      ) : skillCatalog.map((s) => {
                        const viaSlash = slashSkillsInGoal.includes(s.name);
                        const checked = selectedSkills.includes(s.name) || viaSlash;
                        return (
                          <label key={s.name} className={"skill-item" + (viaSlash ? " via-slash" : "")} title={s.path}>
                            <input
                              type="checkbox"
                              checked={checked}
                              disabled={viaSlash /* slash command forces it on */}
                              onChange={() => toggleSkill(s.name)}
                            />
                            <div>
                              <div>
                                <span className="name">{s.name}</span>
                                <span className="src">{s.source}</span>
                              </div>
                              <div className="desc">{s.description}</div>
                            </div>
                          </label>
                        );
                      })}
                    </div>
                    {submitError && <div style={{ color: "var(--red)", fontSize: 12, marginBottom: 10 }}>{submitError}</div>}
                    {current?.isLive ? (
                      <button type="button" className="btn danger" onClick={onCancel}>Cancel run</button>
                    ) : (
                      <button type="submit" className="btn" disabled={!form.goal.trim()}>
                        {isContinue ? "Continue session" : "Run agent"}
                      </button>
                    )}
                  </form>
                );
              })()}

              <div>
                <div className="sessions-header">
                  <h2>Sessions</h2>
                  {current && !current.isLive && (
                    <button className="btn ghost" style={{ width: "auto" }} onClick={onNewRun}>New</button>
                  )}
                </div>
                <div className="sessions">
                  {sessions.length === 0 ? (
                    <div className="sessions-empty">No sessions yet.</div>
                  ) : sessions.map((s) => (
                    <div
                      key={s.id}
                      className={"session-item" + (current?.id === s.id ? " active" : "")}
                      onClick={() => onPickSession(s.id)}
                    >
                      <div>
                        <div className="goal" title={s.goal}>{s.goal || "(no goal)"}</div>
                        <div className="meta">
                          <span className={"dot " + s.status} />
                          <span>{s.status}</span>
                          <span>·</span>
                          <span>{fmtTime(s.started_at)}</span>
                        </div>
                      </div>
                      <button
                        className="delete"
                        title="Delete session"
                        onClick={(e) => onDeleteSession(s.id, e)}
                      >×</button>
                    </div>
                  ))}
                </div>
              </div>
            </aside>

            <main className="main">
              {current ? (
                <>
                  <div className="header">
                    <span className="title" title={current.goal}>
                      {current.goal.length > 80 ? current.goal.slice(0, 80) + "…" : current.goal}
                    </span>
                    <span className={"status " + current.status}>{current.status}</span>
                    <div className="spacer" />
                    <div className="meta">
                      <span>{current.model}</span>
                      <span>·</span>
                      <code title={current.workdir}>
                        {current.workdir.length > 40 ? "…" + current.workdir.slice(-40) : current.workdir}
                      </code>
                      <span>·</span>
                      <code title={current.id}>{current.id.slice(0, 8)}</code>
                    </div>
                  </div>
                  <TodosPanel todos={currentTodos} />
                  <div className="events">
                    {current.events.length === 0 ? (
                      <div className="empty">Waiting for first event…</div>
                    ) : (
                      current.events.map((e, i) => <EventRow key={i} ev={e} />)
                    )}
                    <div ref={eventsEndRef} />
                  </div>
                  {pendingQuestion && (
                    <PromptBox
                      sessionId={current.id}
                      question={pendingQuestion}
                    />
                  )}
                </>
              ) : (
                <div className="events">
                  <div className="empty">
                    Configure on the left, then click <em>Run agent</em>.<br />
                    Or pick a past session from the list.
                  </div>
                </div>
              )}
            </main>
          </div>
        );
      }

      function TodosPanel({ todos }) {
        const [collapsed, setCollapsed] = useState(false);
        const counts = todos.reduce((acc, t) => {
          acc[t.status] = (acc[t.status] || 0) + 1;
          return acc;
        }, {});
        const total = todos.length;
        const done = counts.completed || 0;
        return (
          <div className="todos-panel">
            <div className="tp-header" onClick={() => setCollapsed(!collapsed)} title="Click to collapse/expand">
              <span>{collapsed ? "▸" : "▾"} Todos</span>
              <span className="tp-counts">
                {total === 0 ? "no plan yet" : `${done}/${total} complete`}
              </span>
            </div>
            {!collapsed && (
              total === 0 ? (
                <div className="tp-empty">Agent hasn't planned yet. The first action of the run should be a call to <code>update_todos</code>.</div>
              ) : (
                <div className="tp-list">
                  {todos.map((t, i) => (
                    <div key={i} className={"todo-row " + t.status}>
                      <span className="mark">
                        {t.status === "completed" ? "✓" : t.status === "in_progress" ? "▸" : "○"}
                      </span>
                      <span className="content">{t.content}</span>
                    </div>
                  ))}
                </div>
              )
            )}
          </div>
        );
      }

      function PromptBox({ sessionId, question }) {
        const [text, setText] = useState("");
        const [sending, setSending] = useState(false);
        const [err, setErr] = useState(null);
        const taRef = useRef(null);

        useEffect(() => {
          // Auto-focus the textarea whenever a new question appears.
          taRef.current?.focus();
          setText("");
          setErr(null);
        }, [question?.question_id]);

        const send = async (answerText) => {
          setSending(true);
          setErr(null);
          try {
            const r = await fetch(`/api/sessions/${sessionId}/answer`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                question_id: question.question_id,
                answer: answerText,
              }),
            });
            if (!r.ok) {
              const body = await r.json().catch(() => ({}));
              throw new Error(body.error || `HTTP ${r.status}`);
            }
            setText("");
            // The agent's next event-stream update will include the
            // `answer` event, which makes pendingQuestion null and unmounts
            // this component. No further cleanup needed here.
          } catch (e) {
            setErr(String(e.message || e));
          } finally {
            setSending(false);
          }
        };

        const onSubmit = (e) => {
          e.preventDefault();
          if (!sending) send(text);
        };

        const onKeyDown = (e) => {
          if (e.key === "Enter" && (e.ctrlKey || e.metaKey) && !sending) {
            e.preventDefault();
            send(text);
          }
        };

        return (
          <form className="prompt-box" onSubmit={onSubmit}>
            <div className="pb-question">Agent is waiting for your answer.</div>
            {question.options && question.options.length > 0 && (
              <div className="pb-options">
                {question.options.map((opt) => (
                  <button
                    key={opt}
                    type="button"
                    disabled={sending}
                    onClick={() => send(opt)}
                    title={`Send "${opt}" as the answer`}
                  >{opt}</button>
                ))}
              </div>
            )}
            <div className="pb-row">
              <textarea
                ref={taRef}
                value={text}
                onChange={(e) => setText(e.target.value)}
                onKeyDown={onKeyDown}
                placeholder="Your answer… (Ctrl/⌘+Enter to send)"
                disabled={sending}
              />
              <button type="submit" className="send" disabled={sending}>
                {sending ? "…" : "Send"}
              </button>
            </div>
            {err && <div className="pb-error">{err}</div>}
          </form>
        );
      }

      function EventRow({ ev }) {
        switch (ev.type) {
          case "started":
            return <div className="event started">▶ goal: {ev.text}</div>;
          case "iteration":
            return <div className="event iteration">── iteration {ev.iter} ──</div>;
          case "model_text":
            return <div className="event model_text">{ev.text}</div>;
          case "tool_call":
            return (
              <div className="event tool_call">
                → <span className="name">{ev.tool}</span>
                <details className="args">
                  <summary>{prettyArgs(ev.arguments)}</summary>
                  <pre>{ev.arguments}</pre>
                </details>
              </div>
            );
          case "tool_result":
            return (
              <div className={"event tool_result" + (ev.is_error ? " error" : "")}>
                {ev.result}
              </div>
            );
          case "compaction": {
            const delta = (ev.tokens_before || 0) - (ev.tokens_after || 0);
            const arrow = ev.tokens_before != null && ev.tokens_after != null
              ? ` (${ev.tokens_before} → ${ev.tokens_after} tok, ${delta >= 0 ? "−" : "+"}${Math.abs(delta)})`
              : "";
            return (
              <div className={"event compaction" + (ev.is_error ? " error" : "")}>
                ⌬ {ev.kind}: {ev.text}{arrow}
              </div>
            );
          }
          case "skill_activated":
            return (
              <div className="event skill_activated">
                ✦ skill activated: <span className="skill-name">{ev.skill}</span>
                {ev.text && <div className="skill-desc">{ev.text}</div>}
              </div>
            );
          case "question":
            return (
              <div className="event question">
                <div className="q-label">? agent asks</div>
                <div className="q-text">{ev.question}</div>
              </div>
            );
          case "answer":
            return (
              <div className="event answer">
                <span className="a-label">↳ you</span>{ev.text || <em style={{ color: "var(--muted)" }}>(empty)</em>}
              </div>
            );
          case "todo_update": {
            const n = (ev.todos || []).length;
            const done = (ev.todos || []).filter((t) => t.status === "completed").length;
            return (
              <div className="event compaction" title="See the Todos panel above for the current plan">
                ▤ todos updated ({done}/{n} complete)
              </div>
            );
          }
          case "done":
            return (
              <div className={"event done " + (ev.reason || "")}>
                {ev.reason === "finished" && "✓ finished"}
                {ev.reason === "max_iter" && "⚠ reached max iterations"}
                {ev.reason === "canceled" && "⚠ canceled"}
                {ev.reason === "error" && `✗ error: ${ev.text || "unknown"}`}
                {ev.summary && <span className="pill">{ev.summary}</span>}
              </div>
            );
          default:
            return null;
        }
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
