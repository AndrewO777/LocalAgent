<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LocalAgent</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --panel-2: #1c2128;
        --border: #30363d;
        --fg: #e6edf3;
        --muted: #8b949e;
        --accent: #58a6ff;
        --green: #3fb950;
        --yellow: #d29922;
        --red: #f85149;
        --purple: #bc8cff;
      }
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        font-size: 14px;
      }
      .app { display: grid; grid-template-columns: 360px 1fr; height: 100%; }
      .sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
      .sidebar h1 { font-size: 18px; margin: 0 0 4px 0; }
      .sidebar .sub { color: var(--muted); font-size: 12px; }
      .field { display: flex; flex-direction: column; margin-bottom: 14px; }
      .field label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
      .field input, .field textarea, .field select {
        background: var(--panel-2);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 10px;
        font: inherit;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 13px;
      }
      .field textarea { resize: vertical; min-height: 80px; }
      .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--accent); }
      .btn {
        background: var(--accent);
        color: #0d1117;
        border: 0;
        border-radius: 6px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        font-size: 14px;
      }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn.danger { background: var(--red); color: white; }
      .btn.ghost { background: transparent; color: var(--fg); border: 1px solid var(--border); padding: 7px 10px; font-size: 12px; font-weight: 500; }

      .sessions-header { display: flex; align-items: center; justify-content: space-between; }
      .sessions-header h2 { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin: 0; }
      .sessions { display: flex; flex-direction: column; gap: 4px; }
      .session-item {
        display: grid; grid-template-columns: 1fr auto; gap: 4px; align-items: center;
        background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px;
        padding: 8px 10px; cursor: pointer; transition: border-color 0.1s;
      }
      .session-item:hover { border-color: var(--accent); }
      .session-item.active { border-color: var(--accent); background: rgba(88,166,255,0.08); }
      .session-item .goal {
        font-size: 13px; color: var(--fg); overflow: hidden; text-overflow: ellipsis;
        white-space: nowrap; max-width: 220px;
      }
      .session-item .meta { font-size: 11px; color: var(--muted); display: flex; gap: 6px; align-items: center; margin-top: 2px; }
      .session-item .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
      .session-item .dot.running { background: var(--yellow); animation: pulse 1.5s ease-in-out infinite; }
      .session-item .dot.finished { background: var(--green); }
      .session-item .dot.error, .session-item .dot.canceled, .session-item .dot.max_iter { background: var(--red); }
      .session-item .delete {
        background: transparent; border: 0; color: var(--muted); cursor: pointer; padding: 4px 6px;
        font-size: 16px; line-height: 1; border-radius: 4px;
      }
      .session-item .delete:hover { background: var(--red); color: white; }
      .sessions-empty { color: var(--muted); font-size: 12px; font-style: italic; padding: 4px 0; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

      .continue-banner {
        background: rgba(88,166,255,0.08); border: 1px solid var(--accent); border-radius: 6px;
        padding: 10px 12px; margin-bottom: 14px;
      }
      .continue-banner-title { font-size: 12px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.04em; }
      .continue-banner-meta { font-size: 12px; color: var(--muted); margin-top: 4px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

      .main { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
      .header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
      .header .title { font-weight: 600; color: var(--fg); }
      .header .meta { font-size: 12px; color: var(--muted); display: flex; gap: 10px; align-items: center; }
      .header .status { font-size: 12px; padding: 3px 8px; border-radius: 12px; background: var(--panel-2); border: 1px solid var(--border); }
      .header .status.running { color: var(--yellow); border-color: var(--yellow); }
      .header .status.finished { color: var(--green); border-color: var(--green); }
      .header .status.error, .header .status.canceled, .header .status.max_iter { color: var(--red); border-color: var(--red); }
      .header .spacer { flex: 1; }
      .events { flex: 1; overflow-y: auto; padding: 16px 20px; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 13px; line-height: 1.55; }
      .event { padding: 6px 0; border-bottom: 1px dashed transparent; }
      .event.iteration { color: var(--accent); font-weight: 700; padding-top: 14px; padding-bottom: 4px; border-top: 1px solid var(--border); margin-top: 10px; }
      .event.iteration:first-child { border-top: 0; margin-top: 0; }
      .event.started { color: var(--muted); }
      .event.model_text { color: var(--fg); white-space: pre-wrap; }
      .event.tool_call { color: var(--yellow); }
      .event.tool_call .name { color: var(--purple); font-weight: 600; }
      .event.tool_result { color: var(--muted); white-space: pre-wrap; padding-left: 16px; border-left: 2px solid var(--border); }
      .event.tool_result.error { color: var(--red); border-left-color: var(--red); }
      .event.done { color: var(--green); font-weight: 700; padding-top: 14px; }
      .event.done.error { color: var(--red); }
      .event.done.canceled, .event.done.max_iter { color: var(--yellow); }
      .empty { color: var(--muted); text-align: center; margin-top: 40px; font-family: inherit; }
      details.args { margin-top: 2px; }
      details.args summary { cursor: pointer; color: var(--muted); font-size: 12px; }
      details.args pre { background: var(--panel-2); border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; margin: 4px 0 0; white-space: pre-wrap; word-break: break-all; }
      .pill { display: inline-block; padding: 1px 6px; border-radius: 4px; background: var(--panel-2); border: 1px solid var(--border); font-size: 11px; color: var(--muted); margin-left: 6px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" data-presets="react">
      const { useState, useEffect, useRef, useCallback } = React;

      // ---------- helpers --------------------------------------------------

      function fmtTime(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        if (isNaN(d.getTime())) return "";
        const now = new Date();
        const sameDay = d.toDateString() === now.toDateString();
        if (sameDay) return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        const diffDays = Math.floor((now - d) / 86400000);
        if (diffDays < 7) return d.toLocaleDateString([], { weekday: "short" }) + " " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        return d.toLocaleDateString();
      }

      function prettyArgs(s) {
        if (!s) return "(no arguments)";
        try {
          const obj = JSON.parse(s);
          const compact = JSON.stringify(obj);
          return compact.length > 120 ? compact.slice(0, 120) + "…" : compact;
        } catch (_) {
          return s.length > 120 ? s.slice(0, 120) + "…" : s;
        }
      }

      // ---------- App ------------------------------------------------------

      function App() {
        const [form, setForm] = useState(() => ({
          model: localStorage.getItem("oa.model") || "qwen2.5-coder:7b",
          host: localStorage.getItem("oa.host") || "",
          workdir: localStorage.getItem("oa.workdir") || ".",
          goal: "",
          max_iterations: Number(localStorage.getItem("oa.maxIter") || 25),
        }));
        const [sessions, setSessions] = useState([]);
        const [current, setCurrent] = useState(null);
        // current shape: { id, goal, model, workdir, status, events, isLive }
        const [submitError, setSubmitError] = useState(null);

        const esRef = useRef(null);
        const eventsEndRef = useRef(null);

        useEffect(() => {
          localStorage.setItem("oa.model", form.model);
          localStorage.setItem("oa.host", form.host);
          localStorage.setItem("oa.workdir", form.workdir);
          localStorage.setItem("oa.maxIter", String(form.max_iterations));
        }, [form.model, form.host, form.workdir, form.max_iterations]);

        useEffect(() => {
          if (eventsEndRef.current) {
            eventsEndRef.current.scrollIntoView({ behavior: "smooth", block: "end" });
          }
        }, [current?.events?.length]);

        const refreshSessions = useCallback(async () => {
          try {
            const r = await fetch("/api/sessions");
            const list = await r.json();
            setSessions(list || []);
          } catch (_) { /* ignore */ }
        }, []);

        useEffect(() => {
          refreshSessions();
          const t = setInterval(refreshSessions, 5000);
          return () => clearInterval(t);
        }, [refreshSessions]);

        useEffect(() => () => { if (esRef.current) esRef.current.close(); }, []);

        const connectSSE = useCallback((id) => {
          if (esRef.current) esRef.current.close();
          const es = new EventSource(`/api/sessions/${id}/events`);
          esRef.current = es;
          const handle = (raw) => {
            try {
              const ev = JSON.parse(raw.data);
              setCurrent((prev) => {
                if (!prev || prev.id !== id) return prev;
                const next = { ...prev, events: [...prev.events, ev] };
                if (ev.type === "done") {
                  next.status = ev.reason;
                  next.isLive = false;
                  es.close();
                  esRef.current = null;
                  refreshSessions();
                }
                return next;
              });
            } catch (_) {}
          };
          ["started", "iteration", "model_text", "tool_call", "tool_result", "error", "done"].forEach((t) => {
            es.addEventListener(t, handle);
          });
          es.onerror = () => { /* EventSource auto-reconnects */ };
        }, [refreshSessions]);

        const onSubmit = async (e) => {
          e.preventDefault();
          setSubmitError(null);
          try {
            const r = await fetch("/api/run", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                model: form.model,
                host: form.host,
                workdir: form.workdir,
                goal: form.goal,
                max_iterations: Number(form.max_iterations) || 25,
              }),
            });
            const body = await r.json();
            if (!r.ok) throw new Error(body.error || `HTTP ${r.status}`);
            setCurrent({
              id: body.session_id,
              goal: form.goal,
              model: form.model,
              workdir: form.workdir,
              status: "running",
              events: [],
              isLive: true,
            });
            connectSSE(body.session_id);
            refreshSessions();
          } catch (err) {
            setSubmitError(String(err.message || err));
          }
        };

        const onContinue = async (e) => {
          e.preventDefault();
          if (!current?.id) return;
          setSubmitError(null);
          try {
            const r = await fetch(`/api/sessions/${current.id}/continue`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                goal: form.goal,
                host: form.host,
                max_iterations: Number(form.max_iterations) || 25,
              }),
            });
            const body = await r.json();
            if (!r.ok) throw new Error(body.error || `HTTP ${r.status}`);
            setCurrent((prev) => prev ? { ...prev, status: "running", isLive: true } : prev);
            setForm((prev) => ({ ...prev, goal: "" }));
            connectSSE(current.id);
            refreshSessions();
          } catch (err) {
            setSubmitError(String(err.message || err));
          }
        };

        const onCancel = async () => {
          if (!current?.id) return;
          await fetch(`/api/sessions/${current.id}/cancel`, { method: "POST" });
        };

        const onPickSession = async (id) => {
          if (current?.id === id && current?.isLive) return;
          if (esRef.current) { esRef.current.close(); esRef.current = null; }
          try {
            const r = await fetch(`/api/sessions/${id}`);
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            const detail = await r.json();
            const isLive = detail.status === "running";
            setCurrent({
              id: detail.id,
              goal: detail.goal,
              model: detail.model,
              workdir: detail.workdir,
              status: detail.status,
              events: detail.events || [],
              isLive,
            });
            if (isLive) connectSSE(id);
          } catch (err) {
            setSubmitError(String(err.message || err));
          }
        };

        const onDeleteSession = async (id, e) => {
          e.stopPropagation();
          if (!confirm("Delete this session? This can't be undone.")) return;
          await fetch(`/api/sessions/${id}`, { method: "DELETE" });
          if (current?.id === id) {
            if (esRef.current) { esRef.current.close(); esRef.current = null; }
            setCurrent(null);
          }
          refreshSessions();
        };

        const onNewRun = () => {
          if (esRef.current) { esRef.current.close(); esRef.current = null; }
          setCurrent(null);
          setSubmitError(null);
        };

        // -------------------------------------------------------------------
        return (
          <div className="app">
            <aside className="sidebar">
              <div>
                <h1>LocalAgent</h1>
                <div className="sub">Agentic loop · litellm + langchaingo · Ollama</div>
              </div>

              {(() => {
                const isContinue = current && !current.isLive && current.status !== "running";
                return (
                  <form onSubmit={isContinue ? onContinue : onSubmit}>
                    {isContinue ? (
                      <div className="continue-banner">
                        <div className="continue-banner-title">Continuing session</div>
                        <div className="continue-banner-meta">
                          <span title={current.workdir}>{current.workdir}</span>
                          <span>·</span>
                          <span>{current.model}</span>
                        </div>
                      </div>
                    ) : (
                      <>
                        <div className="field">
                          <label>Model</label>
                          <input value={form.model} onChange={(e) => setForm({ ...form, model: e.target.value })}
                                 placeholder="qwen2.5-coder:7b" />
                        </div>
                        <div className="field">
                          <label>Ollama host</label>
                          <input value={form.host} onChange={(e) => setForm({ ...form, host: e.target.value })}
                                 placeholder="http://localhost:11434" />
                        </div>
                        <div className="field">
                          <label>Project directory</label>
                          <input value={form.workdir} onChange={(e) => setForm({ ...form, workdir: e.target.value })}
                                 placeholder="C:\path\to\project" />
                        </div>
                      </>
                    )}
                    <div className="field">
                      <label>{isContinue ? "Next instruction" : "Goal"}</label>
                      <textarea value={form.goal} onChange={(e) => setForm({ ...form, goal: e.target.value })}
                                placeholder={isContinue ? "Now also add metrics for the /healthz endpoint" : "Add a /healthz endpoint and a test for it"} required />
                    </div>
                    <div className="field">
                      <label>{isContinue ? "Additional iterations" : "Max iterations"}</label>
                      <input type="number" min="1" max="200" value={form.max_iterations}
                             onChange={(e) => setForm({ ...form, max_iterations: e.target.value })} />
                    </div>
                    {submitError && <div style={{ color: "var(--red)", fontSize: 12, marginBottom: 10 }}>{submitError}</div>}
                    {current?.isLive ? (
                      <button type="button" className="btn danger" onClick={onCancel}>Cancel run</button>
                    ) : (
                      <button type="submit" className="btn" disabled={!form.goal.trim()}>
                        {isContinue ? "Continue session" : "Run agent"}
                      </button>
                    )}
                  </form>
                );
              })()}

              <div>
                <div className="sessions-header">
                  <h2>Sessions</h2>
                  {current && !current.isLive && (
                    <button className="btn ghost" style={{ width: "auto" }} onClick={onNewRun}>New</button>
                  )}
                </div>
                <div className="sessions">
                  {sessions.length === 0 ? (
                    <div className="sessions-empty">No sessions yet.</div>
                  ) : sessions.map((s) => (
                    <div
                      key={s.id}
                      className={"session-item" + (current?.id === s.id ? " active" : "")}
                      onClick={() => onPickSession(s.id)}
                    >
                      <div>
                        <div className="goal" title={s.goal}>{s.goal || "(no goal)"}</div>
                        <div className="meta">
                          <span className={"dot " + s.status} />
                          <span>{s.status}</span>
                          <span>·</span>
                          <span>{fmtTime(s.started_at)}</span>
                        </div>
                      </div>
                      <button
                        className="delete"
                        title="Delete session"
                        onClick={(e) => onDeleteSession(s.id, e)}
                      >×</button>
                    </div>
                  ))}
                </div>
              </div>
            </aside>

            <main className="main">
              {current ? (
                <>
                  <div className="header">
                    <span className="title" title={current.goal}>
                      {current.goal.length > 80 ? current.goal.slice(0, 80) + "…" : current.goal}
                    </span>
                    <span className={"status " + current.status}>{current.status}</span>
                    <div className="spacer" />
                    <div className="meta">
                      <span>{current.model}</span>
                      <span>·</span>
                      <code title={current.workdir}>
                        {current.workdir.length > 40 ? "…" + current.workdir.slice(-40) : current.workdir}
                      </code>
                      <span>·</span>
                      <code title={current.id}>{current.id.slice(0, 8)}</code>
                    </div>
                  </div>
                  <div className="events">
                    {current.events.length === 0 ? (
                      <div className="empty">Waiting for first event…</div>
                    ) : (
                      current.events.map((e, i) => <EventRow key={i} ev={e} />)
                    )}
                    <div ref={eventsEndRef} />
                  </div>
                </>
              ) : (
                <div className="events">
                  <div className="empty">
                    Configure on the left, then click <em>Run agent</em>.<br />
                    Or pick a past session from the list.
                  </div>
                </div>
              )}
            </main>
          </div>
        );
      }

      function EventRow({ ev }) {
        switch (ev.type) {
          case "started":
            return <div className="event started">▶ goal: {ev.text}</div>;
          case "iteration":
            return <div className="event iteration">── iteration {ev.iter} ──</div>;
          case "model_text":
            return <div className="event model_text">{ev.text}</div>;
          case "tool_call":
            return (
              <div className="event tool_call">
                → <span className="name">{ev.tool}</span>
                <details className="args">
                  <summary>{prettyArgs(ev.arguments)}</summary>
                  <pre>{ev.arguments}</pre>
                </details>
              </div>
            );
          case "tool_result":
            return (
              <div className={"event tool_result" + (ev.is_error ? " error" : "")}>
                {ev.result}
              </div>
            );
          case "done":
            return (
              <div className={"event done " + (ev.reason || "")}>
                {ev.reason === "finished" && "✓ finished"}
                {ev.reason === "max_iter" && "⚠ reached max iterations"}
                {ev.reason === "canceled" && "⚠ canceled"}
                {ev.reason === "error" && `✗ error: ${ev.text || "unknown"}`}
                {ev.summary && <span className="pill">{ev.summary}</span>}
              </div>
            );
          default:
            return null;
        }
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
